{% extends "base/layout.html" %}

{% block title %}Nova unidade{% endblock %}

{% block content %}
  <div class="page-header">
    <h1>Nova unidade</h1>
    <a class="button secondary" href="{% url 'core:unit_list' %}">Voltar</a>
  </div>
  <section class="panel">
    <form method="post">
      {% csrf_token %}
      {% include "core/_form_fields.html" %}
      <button class="button" type="submit">Salvar</button>
    </form>
  </section>
{% endblock %}
