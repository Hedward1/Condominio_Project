{% extends "base/layout.html" %}

{% block title %}Vincular pessoa a unidade{% endblock %}

{% block content %}
  <div class="page-header">
    <div>
      <h1>Vincular pessoa a unidade</h1>
      <p class="muted">Escolha bloco, unidade, pessoa e tipo de vinculo.</p>
    </div>
    <a class="button secondary" href="{% url 'core:unit_occupancy_list' %}">Voltar</a>
  </div>
  <section class="panel">
    <form method="post">
      {% csrf_token %}
      {% include "core/_form_fields.html" %}
      <button class="button" type="submit">Salvar</button>
    </form>
  </section>
{% endblock %}
