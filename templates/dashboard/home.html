{% extends "base/layout.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
  <h1>Dashboard</h1>
  <div class="grid">
    <div class="metric">
      <span class="muted">Unidades</span>
      <strong>{{ summary.total_units }}</strong>
    </div>
    <div class="metric">
      <span class="muted">Moradores ativos</span>
      <strong>{{ summary.active_residents }}</strong>
    </div>
  </div>
  <p>
    <a class="button secondary" href="{% url 'core:block_list' %}">Blocos</a>
    <a class="button secondary" href="{% url 'core:unit_list' %}">Unidades</a>
    <a class="button secondary" href="{% url 'core:membership_list' %}">Membros</a>
    <a class="button secondary" href="{% url 'core:unit_occupancy_list' %}">Vinculos</a>
  </p>
{% endblock %}
